<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      * {
          font-family: "Geist", sans-serif;
        }  
      @theme {
        --font-syne: "Syne", sans-serif;
        --font-dm: "DM Sans", sans-serif;
        --color-navy: #1d3557;
        --color-teal: #2a9d8f;
        --color-coral: #e76f51;

        --animate-fade-up: fadeUp 0.3s ease forwards;
        @keyframes fadeUp {
          0% {
            opacity: 0;
            transform: translateY(10px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>


    <script src="https://kit.fontawesome.com/cc9e8f4940.js" crossorigin="anonymous"></script>
  </head>
  

  <body class="bg-slate-100 font-dm min-h-screen">
    <nav class="bg-white " >
        <div class="px-15 py-5 flex justify-between ">
          <div class="flex gap-1">
          <img class="w-[20px] h-[20px]" src="/style/assets/github-logo.png" alt="">
          <p class="font-semibold">Github Issues Tracer</p>
          </div>
          <div class="flex gap-2">
           <input type="text" placeholder="🔍 Search Issue" class="input input-bordered w-full max-w-xs" />
           <button class="btn btn-primary">+ New Issue</button>
           </div>
        </div>
    </nav>
    <header class="px-5 py-6 md:max-w-6xl mx-auto">

    </header>
    

    <div class="md:max-w-6xl mx-auto">
      

        <!-- Divider -->
        <hr class="border-slate-200 mb-6" />

        <!-- Section Header -->

        <!-- Tabs -->
        <div class="bg-white rounded-2xl border-2 border-slate-100 px-6 py-4">
          <div class="flex flex-wrap gap-2 mb-2 ">
          <button
            id="all"
            onclick="stab('all')"
            class="btn text-slate-500 w-30"
          >
            All
          </button>
          <button
            id="open"
            onclick="stab('open')"
            class="btn text-slate-500 w-30"
          >
            Open
          </button>
          <button
            id="closed"
            onclick="stab('closed')"
            class="btn text-slate-500 w-30"
          >
            Closed
          </button>
          </div>
        </div>
        <div class=" rounded-2xl items-center  justify-between flex-wrap gap-2 mb-4 mt-3 bg-white ">
            <div class="flex items-center  justify-between gap-2 mb-4 mt-3 pr-4 border-b-1 border-slate-200">
              <div class="flex gap-2 p-4">
               <img class="bg-[#ECE4FF] rounded-3xl" src="/style/assets/Aperture.png" alt="" srcset="">
               <div>
                <h2 class="font-syne text-xl font-bold text-navy"><span id="co">50</span> Issues</h2>
                <p class="text-slate-400">Track and manage your project issues</p>
               </div>
              </div>
              <div class="flex gap-1 items-center ">
               <p><div class="gap-2 w-3 h-3 bg-green-500 rounded-full"></div> open<div class="w-3 h-3 bg-violet-500 rounded-full"></div> closed</p>
              </div>
            </div>

          <!-- card stared -->
        <div class="flex gap-4">
            <section id="all-c" class="grid grid-cols-4 gap-4 p-4 w-full">
                
                



            </section>
            <section class="grid grid-cols-4 gap-4 p-4 w-full" id="i-c">

            </section>
            <section class="grid grid-cols-4 gap-4 p-4 w-full" id="r-c">

            </section>  
        </div>
          
        </div>

        <!-- Job Cards -->
        

        
        </div>
    </div>
    <script src="hi.js"></script>
  </body>

</html>
</body>
</html>
